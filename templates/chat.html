<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Assistant - Chat</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        height: 100vh;
        overflow: hidden;
        color: #f1f5f9;
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: 
          radial-gradient(circle at 20% 80%, rgba(147, 51, 234, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 40% 40%, rgba(16, 185, 129, 0.04) 0%, transparent 50%);
        pointer-events: none;
        z-index: -1;
      }

      /* Main Layout */
      .app-container {
        display: flex;
        height: 100vh;
      }

      /* Left Sidebar */
      .sidebar {
        width: 320px;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(16px);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        transform: translateX(0);
        transition: transform 0.3s ease;
      }

      .sidebar-header {
        padding: 20px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .sidebar-title {
        font-size: 18px;
        font-weight: 700;
        color: #f8fafc;
      }

      .new-chat-btn {
        padding: 8px 16px;
        background: rgba(59, 130, 246, 0.2);
        color: #93c5fd;
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-left: auto;
      }

      .new-chat-btn:hover {
        background: rgba(59, 130, 246, 0.3);
        color: #bfdbfe;
      }

      .chat-history {
        flex: 1;
        overflow-y: auto;
        padding: 8px 0;
      }

      .chat-history::-webkit-scrollbar {
        width: 4px;
      }

      .chat-item {
        padding: 16px 24px;
        cursor: pointer;
        transition: all 0.2s ease;
        border-left: 3px solid transparent;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .chat-item:hover {
        background: rgba(59, 130, 246, 0.1);
        border-left-color: #3b82f6;
      }

      .chat-item.active {
        background: rgba(59, 130, 246, 0.15);
        border-left-color: #3b82f6;
        color: #bfdbfe;
      }

      .chat-avatar {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 14px;
        color: white;
        flex-shrink: 0;
      }

      .chat-preview {
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .chat-time {
        font-size: 12px;
        opacity: 0.6;
        white-space: nowrap;
      }

      /* Main Content */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* Navigation Header */
      .nav-header {
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        color: white;
      }

      .username-text {
        font-weight: 600;
        font-size: 15px;
        color: #f1f5f9;
      }

      .logout-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: rgba(239, 68, 68, 0.1);
        color: #fca5a5;
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-left: 16px;
      }

      .logout-btn:hover {
        background: rgba(239, 68, 68, 0.2);
        color: #f87171;
      }

      /* Chat Container */
      .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 60px);
        padding: 0;
      }

      .chat-header {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .assistant-avatar {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, #10b981, #059669);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      }

      .assistant-info h2 {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 2px;
        color: #f8fafc;
      }

      .assistant-info p {
        font-size: 13px;
        color: #94a3b8;
        margin: 0;
      }

      .status-indicator {
        width: 8px;
        height: 8px;
        background: #10b981;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
        70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
        100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
      }

      .chat-messages {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scrollbar-width: thin;
      }

      .chat-messages::-webkit-scrollbar {
        width: 6px;
      }

      .chat-messages::-webkit-scrollbar-track {
        background: #334155;
      }

      .chat-messages::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 3px;
      }

      .welcome-message {
        text-align: center;
        padding: 32px 40px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        max-width: 500px;
        margin: 0 auto;
      }

      .welcome-message h3 {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 12px;
        color: #f1f5f9;
      }

      .welcome-message p {
        font-size: 16px;
        margin-bottom: 28px;
        opacity: 0.8;
      }

      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }

      .suggestion-chip {
        padding: 12px 24px;
        background: rgba(59, 130, 246, 0.1);
        color: #93c5fd;
        border: 1px solid rgba(59, 130, 246, 0.2);
        border-radius: 24px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .suggestion-chip:hover {
        background: rgba(59, 130, 246, 0.2);
        color: #bfdbfe;
        transform: translateY(-1px);
      }

      .chat-input {
        padding: 24px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(16px);
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .input-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 16px 20px;
        backdrop-filter: blur(12px);
        transition: all 0.2s ease;
      }

      .input-wrapper:focus-within {
        border-color: rgba(59, 130, 246, 0.5);
        box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
      }

      #messageInput {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: #f1f5f9;
        font-size: 16px;
        padding: 4px 0;
        font-family: inherit;
      }

      #messageInput::placeholder {
        color: #94a3b8;
      }

      .emoji-btn {
        background: rgba(251, 191, 36, 0.2);
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: #fbbf24;
        font-size: 18px;
        transition: all 0.2s ease;
      }

      .emoji-btn:hover {
        background: rgba(251, 191, 36, 0.3);
        transform: scale(1.05);
      }

      #sendButton {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
        color: white;
      }

      #sendButton:hover:not(:disabled) {
        transform: translateY(-2px) scale(1.05);
        box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
      }

      /* Message Styles */
      .message {
        display: flex;
        gap: 12px;
        max-width: 75%;
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .message.user { margin-left: auto; flex-direction: row-reverse; }
      .message-bubble {
        padding: 14px 20px;
        border-radius: 20px;
        max-width: 100%;
        font-size: 15px;
        line-height: 1.5;
        word-wrap: break-word;
      }

      .message.user .message-bubble {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: white;
        border-bottom-right-radius: 8px;
      }

      .message.assistant .message-bubble {
        background: rgba(255, 255, 255, 0.1);
        color: #f1f5f9;
        border-bottom-left-radius: 8px;
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .message.user .message-avatar { background: rgba(59, 130, 246, 0.3); color: #60a5fa; }
      .message.assistant .message-avatar { background: rgba(16, 185, 129, 0.3); color: #34d399; }

      /* Responsive */
      @media (max-width: 1024px) {
        .sidebar {
          transform: translateX(-100%);
        }
        .sidebar.open {
          transform: translateX(0);
        }
      }

      @media (max-width: 768px) {
        .nav-header, .chat-header, .chat-input {
          padding-left: 16px;
          padding-right: 16px;
        }
        .chat-messages {
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <!-- Left Sidebar -->
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">Chat History</div>
          <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
        </div>
        <div class="chat-history" id="chatHistory"></div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Navigation Header -->
        <nav class="nav-header">
          <div class="user-info">
            <div class="user-avatar">
              <span class="avatar-initial">{{ user.username[0] }}</span>
            </div>
            <span class="username-text">{{ user.username }}</span>
          </div>
          <button class="logout-btn" onclick="handleLogout()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Logout
          </button>
        </nav>

        <!-- Chat Container -->
        <div class="chat-container">
          <div class="chat-header">
            <div class="assistant-avatar">🤖</div>
            <div class="assistant-info">
              <h2 id="chatTitle">Personal Assistant</h2>
              <p>Your intelligent AI companion</p>
            </div>
            <div class="status-indicator"></div>
          </div>

          <div class="chat-messages" id="chatMessages">
            <div class="welcome-message">
              <h3>👋 Hello! I'm your Personal Assistant</h3>
              <p>How can I help you today?</p>
              <div class="suggestions">
                <div class="suggestion-chip" onclick="sendSuggestion('Tell me about yourself')">
                  Tell me about yourself
                </div>
                <div class="suggestion-chip" onclick="sendSuggestion('What can you help me with?')">
                  What can you help me with?
                </div>
                <div class="suggestion-chip" onclick="sendSuggestion('Give me some tips')">
                  Give me some tips
                </div>
              </div>
            </div>
          </div>

          <div class="chat-input">
            <div class="input-wrapper">
              <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off"/>
              <button class="emoji-btn" onclick="insertEmoji()">😊</button>
            </div>
            <button id="sendButton">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22,11 13,22 2,11"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Global state
      const USER_ID = '{{ user.username }}';
      let currentChatId = 'default';
      let chats = JSON.parse(localStorage.getItem(`chatHistory_${USER_ID}`)) || [];
      
      // Initialize
      document.addEventListener('DOMContentLoaded', function() {
        loadChatHistory();
        loadCurrentChat();
        setupEventListeners();
      });

      function setupEventListeners() {
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const sidebar = document.getElementById('sidebar');
        
        messageInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
        
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('input', () => {
          sendButton.disabled = !messageInput.value.trim();
        });
        
        // Toggle sidebar on mobile
        document.addEventListener('click', (e) => {
          if (e.target.matches('.sidebar-toggle, .sidebar-toggle *')) {
            sidebar.classList.toggle('open');
          }
        });
      }

      function generateId() {
        return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
      }

      function saveChatHistory() {
        localStorage.setItem(`chatHistory_${USER_ID}`, JSON.stringify(chats));
        loadChatHistory();
      }

      function loadChatHistory() {
        const chatHistory = document.getElementById('chatHistory');
        chatHistory.innerHTML = '';
        
        chats.forEach(chat => {
          const chatItem = document.createElement('div');
          chatItem.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
          chatItem.onclick = () => loadChat(chat.id);
          chatItem.innerHTML = `
            <div class="chat-avatar">${chat.title[0] || 'C'}</div>
            <div>
              <div class="chat-preview">${chat.title}</div>
              <div class="chat-time">${formatTime(chat.lastUpdated)}</div>
            </div>
          `;
          chatHistory.appendChild(chatItem);
        });
      }

      function createNewChat() {
        const newChatId = generateId();
        const newChat = {
          id: newChatId,
          title: 'New Chat',
          messages: [],
          created: Date.now(),
          lastUpdated: Date.now()
        };
        
        chats.unshift(newChat);
        currentChatId = newChatId;
        saveChatHistory();
        clearChat();
        document.getElementById('chatTitle').textContent = 'New Chat';
      }

      function loadChat(chatId) {
        const chat = chats.find(c => c.id === chatId);
        if (chat) {
          currentChatId = chatId;
          document.getElementById('chatTitle').textContent = chat.title;
          renderMessages(chat.messages);
          saveChatHistory();
        }
      }

      function loadCurrentChat() {
        if (chats.length > 0) {
          currentChatId = chats[0].id;
          document.getElementById('chatTitle').textContent = chats[0].title;
          renderMessages(chats[0].messages);
        }
      }

      function sendMessage() {
        const messageInput = document.getElementById('messageInput');
        const message = messageInput.value.trim();
        if (!message) return;

        // Add user message
        addMessage(message, 'user');
        messageInput.value = '';

        // Update current chat
        const chat = chats.find(c => c.id === currentChatId) || chats[0];
        if (chat) {
          chat.messages.push({ role: 'user', content: message, timestamp: Date.now() });
          chat.lastUpdated = Date.now();
          if (chat.title === 'New Chat' || chat.title === 'Untitled') {
            chat.title = message.length > 30 ? message.substring(0, 30) + '...' : message;
          }
          saveChatHistory();
        }

        // Simulate AI response
        const sendButton = document.getElementById('sendButton');
        sendButton.disabled = true;
        
        setTimeout(() => {
          const response = `Thanks for your message: "${message}". I'm here to help with coding, projects, and more!`;
          addMessage(response, 'assistant');
          
          if (chat) {
            chat.messages.push({ role: 'assistant', content: response, timestamp: Date.now() });
            chat.lastUpdated = Date.now();
            saveChatHistory();
          }
          
          sendButton.disabled = false;
          messageInput.focus();
        }, 800);
      }

      function addMessage(content, role) {
        const chatMessages = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        
        messageDiv.innerHTML = `
          <div class="message-avatar">${role === 'user' ? '{{ user.username[0] }}' : '🤖'}</div>
          <div class="message-bubble">${content}</div>
        `;
        
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        chatMessages.querySelector('.welcome-message')?.remove();
      }

      function renderMessages(messages) {
        const chatMessages = document.getElementById('chatMessages');
        chatMessages.innerHTML = '';
        
        messages.forEach(msg => {
          addMessage(msg.content, msg.role);
        });
        
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function clearChat() {
        const chatMessages = document.getElementById('chatMessages');
        chatMessages.innerHTML = `
          <div class="welcome-message">
            <h3>👋 New Conversation</h3>
            <p>Start chatting with your assistant!</p>
            <div class="suggestions">
              <div class="suggestion-chip" onclick="sendSuggestion('Tell me about yourself')">Tell me about yourself</div>
              <div class="suggestion-chip" onclick="sendSuggestion('What can you help me with?')">What can you help me with?</div>
              <div class="suggestion-chip" onclick="sendSuggestion('Give me some tips')">Give me some tips</div>
            </div>
          </div>
        `;
      }

      function sendSuggestion(text) {
        document.getElementById('messageInput').value = text;
        sendMessage();
      }

      function insertEmoji() {
        document.getElementById('messageInput').value += ' 😊';
        document.getElementById('messageInput').focus();
      }

      function handleLogout() {
        if (confirm('Are you sure you want to logout?')) {
          window.location.href = '/logout';
        }
      }

      function formatTime(timestamp) {
        return new Date(timestamp).toLocaleDateString('en-US', { 
          month: 'short', 
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      }
    </script>
  </body>
</html>
