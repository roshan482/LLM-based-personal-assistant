<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Assistant - Chat</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='chat.css') }}"
    />
  </head>
  <body>
    <!-- Navigation Header -->
    <nav class="nav-header">
      <div class="nav-container">
        <div class="user-info">
          <div class="user-avatar">
            <span class="avatar-initial">{{ user.username[0] }}</span>
          </div>
          <span class="username-text">{{ user.username }}</span>
        </div>
        <button class="logout-btn" onclick="handleLogout()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          Logout
        </button>
      </div>
    </nav>

    <!-- Chat Container -->
    <div class="chat-container">
      <!-- Chat Header -->
      <div class="chat-header">
        <div class="assistant-avatar">
          <i class="fas fa-robot"></i>
        </div>
        <div class="assistant-info">
          <h2>Personal Assistant</h2>
          <p>Your intelligent AI companion</p>
        </div>
        <div class="status-indicator"></div>
      </div>

      <!-- Chat Messages -->
      <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">
          <h3>👋 Hello! I'm your Personal Assistant</h3>
          <p>How can I help you today?</p>
          <div class="suggestions">
            <div
              class="suggestion-chip"
              onclick="sendSuggestion('Tell me about yourself')"
            >
              Tell me about yourself
            </div>
            <div
              class="suggestion-chip"
              onclick="sendSuggestion('What can you help me with?')"
            >
              What can you help me with?
            </div>
            <div
              class="suggestion-chip"
              onclick="sendSuggestion('Give me some tips')"
            >
              Give me some tips
            </div>
          </div>
        </div>
      </div>

      <!-- Chat Input -->
      <div class="chat-input">
        <div class="input-wrapper">
          <input
            type="text"
            id="messageInput"
            placeholder="Type your message here..."
            autocomplete="off"
          />
          <button class="emoji-btn" onclick="insertEmoji()">😊</button>
        </div>
        <button id="sendButton">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>

    <!-- Dashboard JavaScript -->
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
  </body>
</html>
